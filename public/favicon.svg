    <rect x="35" y="19" width="3.5" height="3.5" rx="1"/>
    <rect x="41" y="19" width="3.5" height="3.5" rx="1"/>
    <rect x="47" y="19" width="3.5" height="3.5" rx="1"/>
    <rect x="35" y="26" width="3.5" height="3.5" rx="1"/>
    <rect x="41" y="26" width="3.5" height="3.5" rx="1"/>
    <rect x="47" y="26" width="3.5" height="3.5" rx="1"/>
    <rect x="35" y="33" width="3.5" height="3.5" rx="1"/>
    <rect x="41" y="33" width="3.5" height="3.5" rx="1"/>
    <rect x="47" y="33" width="3.5" height="3.5" rx="1"/>
    <rect x="35" y="40" width="3.5" height="3.5" rx="1"/>
    <rect x="41" y="40" width="3.5" height="3.5" rx="1"/>
    <rect x="47" y="40" width="3.5" height="3.5" rx="1"/>
  </g>
