services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotel-inventory-app
    container_name: hotel_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hotel
      DB_USERNAME: hotel
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hotel

  nginx:
    image: nginx:1.27-alpine
    container_name: hotel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hotel

  mysql:
    image: mysql:8.0
    container_name: hotel_mysql
    environment:
      MYSQL_DATABASE: hotel
      MYSQL_USER: hotel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hotel

  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    networks:
      - hotel

volumes:
  mysql_data:

networks:
  hotel:
    driver: bridge
